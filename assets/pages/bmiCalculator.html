<body>
    <div id="title_container">
        <h1>BMI CALCULATOR</h1>
        <div class="buttoni">
            <div>
                <button  class="registrati" onclick="location.href='assets/pages/login.html';"> Login </button>
            </div> 
            <div>
                <button  class="registrati" onclick="location.href='assets/pages/registrati.html';"> Sign in </button>

    </div>
    <nav class="navBar">

            <div class="box_inserimento">

                    Peso:
                </label>
                <input type="text" id="input_peso" class="textBox_input">

        <div id="box_tachimetro">
            <p class="indice_tachimetro" id="i_15">15</p>

            <p class="indice_tachimetro" id="i_40">40</p>

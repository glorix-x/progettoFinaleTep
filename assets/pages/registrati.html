<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/stylesheet.css">
    <link rel="stylesheet" href="../css/form.css">
    <script src="..\javascript\form.js" defer></script>

</head>
<body>
    <div class="contenitore">
        <h1>Login</h1>
        <form id="viaggiForm">
    
            <label>
                <p>
                Nickname:
                <input type="text" id="nickname">
                <span id="errNickname"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                    Password:
                    <input type="password" id="password">
                    <span id="errPassword"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Verifica Password:
                <input type="password" id="verificaPassword">
                <span id="errVerifica"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Data di partenza:
                <input type="text" id="dataPartenza" placeholder="AAAA-MM-GG">
                <span id="errDataPartenza"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Data di ritorno:
                <input type="text" id="dataRitorno" placeholder="AAAA-MM-GG">
                <span id="errDataRitorno"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Destinazione:
                <input type="text" id="destinazione">
                <span id="errDestinazione"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Tipologia di viaggio:
                <select id="tipologia">
                    <option value="">Seleziona...</option>
                    <option value="Mare">Mare</option>
                    <option value="Montagna">Montagna</option>
                    <option value="Città d'arte">Città d'arte</option>
                    <option value="Avventura">Avventura</option>
                </select>
                </p>
                <span id="errTipologia"></span>
            </label><br>
    
            <label>
                <p>
                Numero di partecipanti:
                <input type="text" id="numeroPartecipanti">
                <span id="errNumeroPartecipanti"></span>
                </p>
            </label><br>
    
            <button type="submit">Login</button>
        </form>
    
        <div id="risultato"></div>
</body>
</html>

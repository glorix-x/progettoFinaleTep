<!DOCTYPE html>
<html lang="en">
<head>
       <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>
    <link rel="stylesheet" href="../css/stylesheet.css">
    <link rel="stylesheet" href="../css/form.css">
    <script src="..\javascript\formSignIn.js" defer></script>

</head>
<body>
    <div class="contenitore">
        <h1>Sign In</h1>
        <form id="SignInForm">
    
            <label>
                <p>
                Nickname:
                <input type="text" id="nickname">
                <span id="errNickname"></span>
                </p>
            </label><br>

            <label>
                <p>
                Mail:
                <input type="text" id="mail">
                <span id="errMail"></span>
                </p>
            </label><br>
            
            <label>
                <p>
                Password:
                    <input type="password" id="password">
                    <span id="errPassword"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Verifica Password:
                <input type="password" id="verificaPassword">
                <span id="errVerifica"></span>
                </p>
            </label><br>
    
            <label>
                <p>
                Data di nascita:
                <input type="text" id="dataPartenza" placeholder="AAAA-MM-GG">
                <span id="errDataPartenza"></span>
                </p>
            </label><br>

            <a href="../../index.html" class="registrati">Sign in</a>
        </form>

</body>
</html>
